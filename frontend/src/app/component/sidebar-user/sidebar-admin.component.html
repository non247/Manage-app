<button
  class="hamburger"
  style="font-size: 30px"
  (click)="toggleSidebar()"
  [class.collapsed]="isCollapsed"
>
  <i class="bi bi-list"></i>
</button>

<div
  class="sidebar"
  [class.collapsed]="isCollapsed"
  [class.no-anim]="disableAnimation"
>
  <div class="top">
    <ul class="nav-links">
      <!-- Dashboard -->
      <li
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <a (click)="navigateTo('/dashboard')">
          <i class="bi bi-grid-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            ภาพรวม
          </span>
        </a>
      </li>
      <!-- Product -->
      <li routerLink="/product" routerLinkActive="active">
        <a (click)="navigateTo('/product')">
          <i class="bi bi-box-seam-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            จัดการสินค้า
          </span>
        </a>
      </li>

      <!-- Admin Purchase -->
      <li routerLink="/adminpurchase" routerLinkActive="active">
        <a (click)="navigateTo('/adminpurchase')">
          <i class="bi bi-receipt" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            รายการสั่งซื้อ
          </span>
        </a>
      </li>

      <!-- Admin Inventory -->
      <li routerLink="/admininventory" routerLinkActive="active">
        <a (click)="navigateTo('/admininventory')">
          <i class="bi bi-clipboard2-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            รายการสินค้า
          </span>
        </a>
      </li>

      <!-- Admin HistoryPurchase -->
      <li routerLink="/adminhistorypurchase" routerLinkActive="active">
        <a (click)="navigateTo('/adminhistorypurchase')">
          <i class="bi bi-upc-scan" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            ประวัติการสั่งซื้อ
          </span>
        </a>
      </li>

      <!-- Admin History -->
      <li routerLink="/adminhistory" routerLinkActive="active">
        <a (click)="navigateTo('/adminhistory')">
          <i class="bi bi-clock-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            ประวัติการขาย
          </span>
        </a>
      </li>

      <!-- Forecast -->
      <li routerLink="/forecast" routerLinkActive="active">
        <a (click)="navigateTo('/forecast')">
          <i class="pi pi-chart-line" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            พยากรณ์ยอดขาย
          </span>
        </a>
      </li>

      <!-- Usermanagement -->
      <li routerLink="/usermanagement" routerLinkActive="active">
        <a (click)="navigateTo('/usermanagement')">
          <i class="bi bi-people-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            จัดการผู้ใช้งาน
          </span>
        </a>
      </li>

      <!-- Logout -->
      <li class="logout">
        <a (click)="logout()">
          <i class="bi bi-door-open-fill" style="font-size: 30px"></i>
          <span
            class="text"
            [class.show]="!isCollapsed"
            style="font-size: 20px"
          >
            ออกจากระบบ
          </span>
        </a>
      </li>
    </ul>
  </div>
</div>

<div class="content" [class.shifted]="!isCollapsed">
  <ng-content></ng-content>
</div>
