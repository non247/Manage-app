<div class="layout">
  <div class="main-area">
    <div class="main-content">
      <header class="top-navbar">
        <h1>พยากรณ์การขาย</h1>
      </header>

      <div class="container-box">
        <!-- <div class="title-row">
          <p class="subtitle">เงื่อนไขการพยากรณ์</p>
        </div> -->

        <form
          [formGroup]="predictForm"
          (ngSubmit)="onSubmit()"
          class="prediction-form"
        >
          <div class="form-grid">
            <div class="form-group">
              <label for="start_date">ตั้งแต่วันที่</label>
              <p-datepicker
                id="start_date"
                formControlName="start_date"
                dateFormat="dd/mm/yy"
                [showIcon]="true"
                appendTo="body"
                [maxDate]="this.predictForm.get('end_date')?.value"
              ></p-datepicker>
            </div>

            <div class="form-group">
              <label for="end_date">ถึงวันที่</label>
              <p-datepicker
                id="end_date"
                formControlName="end_date"
                dateFormat="dd/mm/yy"
                [showIcon]="true"
                appendTo="body"
                [minDate]="this.predictForm.get('start_date')?.value"
              ></p-datepicker>
            </div>
          </div>

          <!-- <div class="form-group checkbox-group">
            <div class="checkbox-container">
              <p-checkbox
                formControlName="is_holiday"
                [binary]="true"
                id="is_holiday"
              ></p-checkbox>
              <label for="is_holiday">ผ่านช่วงวันหยุด/เทศกาล</label>
            </div>
          </div> -->

          <div class="submit-container">
            <p-button
              type="button"
              label="ยกเลิก"
              icon="pi pi-times"
              (onClick)="ngOnInit()"
              styleClass="p-button-secondary custom-cancel-btn"
            ></p-button
            ><p-button
              type="submit"
              label="ตกลง"
              icon="pi pi-check"
              [disabled]="!predictForm.valid"
              styleClass="p-button-primary custom-submit-btn"
            ></p-button>
          </div>
        </form>

        <div *ngIf="forecastResult.length > 0" class="summary-cards">
          <div class="summary-card">
            <div class="card-label">Top Flavor</div>
            <div class="card-value">{{ topFlavor }}</div>
            <div class="card-unit">
              {{ topFlavorSold | number: '1.0-0' }} ถ้วย
            </div>
          </div>
          <div class="summary-card">
            <div class="card-label">Total Forecast Sold</div>
            <div class="card-value">
              {{ totalForecastSold | number: '1.0-0' }}
            </div>
            <div class="card-unit">ถ้วย</div>
          </div>
        </div>

        <div *ngIf="forecastResult.length > 0" class="result-card chart-card">
          <h3>ผลการพยากรณ์ตามรส</h3>
          <div class="chart-wrapper">
            <canvas #forecastChartCanvas></canvas>
          </div>
        </div>

        <div *ngIf="forecastResult.length > 0" class="result-card detail-card">
          <h3>รายละเอียดการพยากรณ์ตามรส</h3>
          <div class="flavor-cards">
            <div *ngFor="let item of forecastResult" class="summary-card">
              <div class="card-label">{{ item.flavor }}</div>
              <div class="card-value">
                {{ item.forecasted_totalsold | number: '1.0-0' }}
              </div>
              <div class="card-unit">ถ้วย</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
