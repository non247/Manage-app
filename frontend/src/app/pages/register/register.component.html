<div class="register-page">
  <div class="register-card card-split">

    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="register" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form" @slideForm>
      <h1>สมัครสมาชิก</h1>

      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <form (ngSubmit)="register()" #registerForm="ngForm">

        <!-- Username -->
        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <div class="password-wrapper">
            <input
              type="text"
              name="username"
              [(ngModel)]="Username"
              required
              #usernameRef="ngModel"
              placeholder="ชื่อ-สกุล"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>อีเมล</label>
          <div class="password-wrapper">
            <input
              type="email"
              name="email"
              [(ngModel)]="Email"
              required
              email
              #emailRef="ngModel"
              placeholder="example@email.com"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="Password"
              required
              #passwordRef="ngModel"
              placeholder="ป้อนรหัสผ่าน"
            />
            <i
              class="bi"
              [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="togglePassword()"
            ></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>ยืนยันรหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="ConfirmPassword"
              required
              #confirmRef="ngModel"
              placeholder="ป้อนรหัสผ่านอีกครั้ง"
            />
            <i
              class="bi"
              [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="toggleConfirmPassword()"
            ></i>
          </div>
        </div>

        <!-- 🔥 รวม error ทั้งหมด -->
        <div class="error-slot">

          <p *ngIf="usernameRef.invalid && usernameRef.touched" class="error-text">
            กรุณากรอกชื่อผู้ใช้
          </p>

          <p *ngIf="emailRef.invalid && emailRef.touched" class="error-text">
            กรุณากรอกอีเมลให้ถูกต้อง
          </p>

          <p *ngIf="passwordRef.invalid && passwordRef.touched" class="error-text">
            กรุณากรอกรหัสผ่าน
          </p>

          <p *ngIf="confirmRef.invalid && confirmRef.touched" class="error-text">
            กรุณายืนยันรหัสผ่าน
          </p>

          <p *ngIf="Password && ConfirmPassword && Password !== ConfirmPassword" class="error-text">
            รหัสผ่านไม่ตรงกัน
          </p>

          <p *ngIf="errorMessage" class="error-text">
            {{ errorMessage }}
          </p>

        </div>

        <button type="submit" class="btn-singin">ลงทะเบียน</button>

        <div class="register-link">
          มีบัญชีแล้ว ?
          <a [routerLink]="['/login']">เข้าสู่ระบบ</a>
        </div>

      </form>
    </div>
  </div>
</div>
