<div class="register-page">
  <div class="register-card card-split">
    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="register" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form" @slideForm>
      <h1>สมัครสมาชิก</h1>

      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <form (ngSubmit)="register()" #registerForm="ngForm">
        <!-- Username -->
        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <div class="password-wrapper">
            <input
              type="text"
              name="username"
              [(ngModel)]="Username"
              required
              #usernameRef="ngModel"
              placeholder="ชื่อ-สกุล"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>อีเมล</label>
          <div class="password-wrapper">
            <input
              type="email"
              name="email"
              [(ngModel)]="Email"
              required
              email
              #emailRef="ngModel"
              placeholder="example@email.com"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="Password"
              required
              #passwordRef="ngModel"
              placeholder="ป้อนรหัสผ่าน"
            />
            <i
              class="bi"
              [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="togglePassword()"
            ></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>ยืนยันรหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="ConfirmPassword"
              required
              #confirmRef="ngModel"
              placeholder="ป้อนรหัสผ่านอีกครั้ง"
            />
            <i
              class="bi"
              [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="toggleConfirmPassword()"
            ></i>
          </div>
        </div>

        <!-- 🔥 รวม error ทั้งหมด -->
        <div class="error-slot">
          <!-- Username -->
          <ng-container
            *ngIf="usernameRef.invalid && usernameRef.touched; else emailError"
          >
            <p class="error-text">กรุณากรอกชื่อผู้ใช้</p>
          </ng-container>

          <!-- Email -->
          <ng-template #emailError>
            <ng-container
              *ngIf="
                emailRef.invalid && emailRef.touched;
                else passwordRequired
              "
            >
              <p class="error-text">กรุณากรอกอีเมลให้ถูกต้อง</p>
            </ng-container>
          </ng-template>

          <!-- Password required -->
          <ng-template #passwordRequired>
            <ng-container
              *ngIf="
                passwordRef.errors?.['required'] && passwordRef.touched;
                else passwordLength
              "
            >
              <p class="error-text">กรุณากรอกรหัสผ่าน</p>
            </ng-container>
          </ng-template>

          <!-- Password minlength -->
          <ng-template #passwordLength>
            <ng-container
              *ngIf="
                passwordRef.errors?.['minlength'] && passwordRef.touched;
                else confirmError
              "
            >
              <p class="error-text">รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</p>
            </ng-container>
          </ng-template>

          <!-- Confirm required -->
          <ng-template #confirmError>
            <ng-container
              *ngIf="
                confirmRef.invalid && confirmRef.touched;
                else mismatchError
              "
            >
              <p class="error-text">กรุณายืนยันรหัสผ่าน</p>
            </ng-container>
          </ng-template>

          <!-- Password mismatch -->
          <ng-template #mismatchError>
            <ng-container
              *ngIf="
                Password && ConfirmPassword && Password !== ConfirmPassword;
                else backendError
              "
            >
              <p class="error-text">รหัสผ่านไม่ตรงกัน</p>
            </ng-container>
          </ng-template>

          <!-- Backend error -->
          <ng-template #backendError>
            <p *ngIf="errorMessage" class="error-text">
              {{ errorMessage }}
            </p>
          </ng-template>
        </div>
        <button type="submit" class="btn-singin">ลงทะเบียน</button>

        <div class="register-link">
          มีบัญชีแล้ว ?
          <a [routerLink]="['/login']">เข้าสู่ระบบ</a>
        </div>
      </form>
    </div>
  </div>
</div>
