<div class="register-page">
  <div class="register-card card-split">
    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="register" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form" @slideForm>
      <h1>สมัครสมาชิก</h1>

      <!-- ✅ Success -->
      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <form (ngSubmit)="register()" #registerForm="ngForm">
        <!-- Username -->
        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <div class="password-wrapper">
            <input
              type="text"
              name="username"
              [(ngModel)]="Username"
              required
              placeholder="ชื่อ-สกุล"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="Password"
              required
              placeholder="ป้อนรหัสผ่าน"
            />
            <i
              class="bi"
              [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="togglePassword()"
            ></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>ยืนยันรหัสผ่าน</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="ConfirmPassword"
              required
              placeholder="ป้อนรหัสผ่านอีกครั้ง"
            />
            <i
              class="bi"
              [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="toggleConfirmPassword()"
            ></i>
          </div>
        </div>

        <div class="error-slot">
          <p *ngIf="errorMessage" class="error-text">
            {{ errorMessage }}
          </p>
        </div>

        <button type="submit" class="btn-singin">ลงทะเบียน</button>

        <div class="register-link">
          มีบัญชีแล้ว ?
          <a [routerLink]="['/login']">เข้าสู่ระบบ</a>
        </div>
      </form>
    </div>
  </div>
</div>
