<div class="reset-page">
  <div class="reset-card card-split">
    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="reset-password" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form">
      <h1>รีเซ็ตรหัสผ่าน</h1>

      <!-- success -->
      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <form (ngSubmit)="resetPassword()" #resetForm="ngForm">
        <!-- New Password -->
        <div class="form-group">
          <label for="newPassword">รหัสผ่านใหม่</label>
          <div class="password-wrapper">
            <input
              id="newPassword"
              [type]="showPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="ป้อนรหัสผ่านใหม่"
              #passwordRef="ngModel"
            />

            <button
              type="button"
              class="toggle-btn"
              (click)="showPassword = !showPassword"
              aria-label="toggle password"
            >
              <i
                class="pi"
                [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"
              ></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>

          <div class="password-wrapper">
            <input
              id="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="ป้อนรหัสผ่านอีกครั้ง"
              #confirmRef="ngModel"
            />

            <button
              type="button"
              class="toggle-btn"
              (click)="showConfirmPassword = !showConfirmPassword"
              aria-label="toggle confirm password"
            >
              <i
                class="pi"
                [ngClass]="showConfirmPassword ? 'pi-eye-slash' : 'pi-eye'"
              ></i>
            </button>
          </div>
        </div>

        <!-- 🔥 รวม error ทั้งหมด -->
        <div class="error-slot">
          <!-- Password required -->
          <ng-container
            *ngIf="
              passwordRef.errors?.['required'] && passwordRef.touched;
              else passwordLength
            "
          >
            <p class="error-text">กรุณากรอกรหัสผ่าน</p>
          </ng-container>

          <!-- Password minlength -->
          <ng-template #passwordLength>
            <ng-container
              *ngIf="
                passwordRef.errors?.['minlength'] && passwordRef.touched;
                else confirmRequired
              "
            >
              <p class="error-text">รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</p>
            </ng-container>
          </ng-template>

          <!-- Confirm required -->
          <ng-template #confirmRequired>
            <ng-container
              *ngIf="
                confirmRef.errors?.['required'] && confirmRef.touched;
                else confirmMinlength
              "
            >
              <p class="error-text">กรุณายืนยันรหัสผ่าน</p>
            </ng-container>
          </ng-template>

          <!-- Confirm minlength -->
          <ng-template #confirmMinlength>
            <ng-container
              *ngIf="
                confirmRef.errors?.['minlength'] && confirmRef.touched;
                else mismatchError
              "
            >
              <p class="error-text">รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</p>
            </ng-container>
          </ng-template>

          <!-- Password mismatch -->
          <ng-template #mismatchError>
            <ng-container
              *ngIf="
                newPassword &&
                  confirmPassword &&
                  newPassword !== confirmPassword;
                else backendError
              "
            >
              <p class="error-text">รหัสผ่านไม่ตรงกัน</p>
            </ng-container>
          </ng-template>

          <!-- Backend error -->
          <ng-template #backendError>
            <p *ngIf="errorMessage" class="error-text">
              {{ errorMessage }}
            </p>
          </ng-template>
        </div>

        <button type="submit" class="reset-btn" [disabled]="loading">
          {{ loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่' }}
        </button>

        <p class="back-login">
          กลับไปหน้า <a routerLink="/login">เข้าสู่ระบบ</a>
        </p>
      </form>
    </div>
  </div>
</div>
