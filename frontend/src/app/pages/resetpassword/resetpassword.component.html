<div class="reset-page">
  <div class="reset-card card-split">
    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="reset-password" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form">
      <h1>รีเซ็ตรหัสผ่าน</h1>

      <!-- success -->
      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <form (ngSubmit)="resetPassword()" #resetForm="ngForm">
        <!-- New Password -->
        <div class="form-group">
          <label for="newPassword">รหัสผ่านใหม่</label>

          <div class="password-wrapper">
            <input
              id="newPassword"
              [type]="showPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="ป้อนรหัสผ่านใหม่"
            />

            <i
              class="bi"
              [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="showPassword = !showPassword"
            ></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>

          <div class="password-wrapper">
            <input
              id="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              required
              minlength="6"
              autocomplete="new-password"
              placeholder="ป้อนรหัสผ่านอีกครั้ง"
            />

            <i
              class="bi"
              [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="showConfirmPassword = !showConfirmPassword"
            ></i>
          </div>

          <!-- error -->
          <div class="error-slot">
            <p class="error-text" *ngIf="errorMessage">
              {{ errorMessage }}
            </p>
          </div>
        </div>

        <button type="submit" class="reset-btn" [disabled]="loading">
          {{ loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่' }}
        </button>

        <p class="back-login">
          กลับไปหน้า <a routerLink="/login">เข้าสู่ระบบ</a>
        </p>
      </form>
    </div>
  </div>
</div>
