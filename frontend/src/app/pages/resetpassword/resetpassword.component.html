<div class="reset-page">
  <div class="reset-card card-split">

    <!-- LEFT : IMAGE -->
    <div class="card-image">
      <img src="assets/login.jpg" alt="reset-password" />
    </div>

    <!-- RIGHT : FORM -->
    <div class="card-form">
      <h1>รีเซ็ตรหัสผ่าน</h1>

      <p class="subtitle">
        กรุณากำหนดรหัสผ่านใหม่ของคุณ
      </p>

      <!-- success -->
      <p *ngIf="successMessage" class="success-text">
        {{ successMessage }}
      </p>

      <!-- error -->
      <div class="error-slot">
        <p *ngIf="errorMessage" class="error-text">
          {{ errorMessage }}
        </p>
      </div>

      <form (ngSubmit)="resetPassword()" #resetForm="ngForm">

        <!-- New Password -->
        <div class="form-group">
          <label>รหัสผ่านใหม่</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="newPassword"
              [(ngModel)]="newPassword"
              required
              minlength="6"
              placeholder="กรอกรหัสผ่านใหม่"
            />
            <button
              type="button"
              class="toggle-btn"
              (click)="showPassword = !showPassword"
            >
              {{ showPassword ? 'ซ่อน' : 'แสดง' }}
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>ยืนยันรหัสผ่านใหม่</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              required
              minlength="6"
              placeholder="ยืนยันรหัสผ่านใหม่"
            />
            <button
              type="button"
              class="toggle-btn"
              (click)="showConfirmPassword = !showConfirmPassword"
            >
              {{ showConfirmPassword ? 'ซ่อน' : 'แสดง' }}
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="reset-btn"
          [disabled]="loading"
        >
          {{ loading ? 'กำลังบันทึก...' : 'บันทึกรหัสผ่านใหม่' }}
        </button>

        <p class="back-login">
          <a routerLink="/login">กลับไปหน้าเข้าสู่ระบบ</a>
        </p>
      </form>
    </div>
  </div>
</div>
