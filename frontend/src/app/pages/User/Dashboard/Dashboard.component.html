<div class="layout">
  <div class="main-area">
    <div class="main-content">
      <header class="top-navbar">
        <h1>ภาพรวมของการขายสินค้า</h1>
      </header>
    </div>

    <div class="main-content dashboard-page">
      <div class="bottom-grid">
        <div class="panel product-panel">
          <div class="panel-header">
            <div>
              <h3>จำนวนขายของสินค้าทั้งหมด</h3>
            </div>
          </div>

          <div class="chart-wrap chart-product">
            <canvas #productChartCanvas></canvas>
          </div>
        </div>

        <div class="forecast-box">
          <div class="forecast-header">
            <h3>พยากรณ์รสไอศกรีมที่น่าขายดี</h3>
            <span>อ้างอิงจากแนวโน้มการขายล่าสุด</span>
          </div>

          <div
            *ngIf="predictedFlavors.length > 0; else noForecast"
            class="forecast-list"
          >
            <div
              class="forecast-item"
              *ngFor="let item of predictedFlavors; let i = index"
            >
              <div class="rank-circle">{{ i + 1 }}</div>

              <div class="forecast-detail">
                <h4>{{ item.name }}</h4>
                <p>คาดว่าขายดี จากยอดขาย {{ item.sold | number }} ชิ้น</p>
              </div>
            </div>
          </div>

          <ng-template #noForecast>
            <div class="forecast-empty">
              ยังไม่มีข้อมูลเพียงพอสำหรับการพยากรณ์
            </div>
          </ng-template>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="panel panel-large">
          <div class="panel-header">
            <div>
              <h3>ภาพรวมยอดขาย</h3>
            </div>

            <div class="segmented">
              <button
                type="button"
                class="seg-btn"
                [class.active]="salesView === 'day'"
                (click)="changeSalesView('day')"
              >
                สัปดาห์
              </button>

              <button
                type="button"
                class="seg-btn"
                [class.active]="salesView === 'month'"
                (click)="changeSalesView('month')"
              >
                เดือน
              </button>

              <button
                type="button"
                class="seg-btn"
                [class.active]="salesView === 'year'"
                (click)="changeSalesView('year')"
              >
                ปี
              </button>
            </div>
          </div>

          <div class="calendar-toolbar" *ngIf="salesView === 'day'">
            <p-datepicker
              [(ngModel)]="selectedDate"
              [showIcon]="true"
              dateFormat="dd/mm/yy"
              placeholder="เลือกวันที่"
              (ngModelChange)="onDateChange()"
            ></p-datepicker>
          </div>

          <div class="chart-toolbar" *ngIf="salesView === 'day'">
            <button type="button" class="week-btn" (click)="goPrevWeek()">
              ‹ สัปดาห์ก่อน
            </button>

            <span class="week-label">{{ weekRangeLabel }}</span>

            <button
              type="button"
              class="week-btn"
              (click)="goNextWeek()"
              [disabled]="weekOffset === 0"
            >
              สัปดาห์ถัดไป ›
            </button>

            <button
              type="button"
              class="week-btn today-btn"
              (click)="goCurrentWeek()"
            >
              วันนี้
            </button>
          </div>

          <div class="chart-wrap chart-main">
            <canvas #salesCanvas></canvas>
          </div>

          <div class="panel-subtitle">
            <h3>กราฟเส้นแนวโน้มยอดขาย</h3>
          </div>

          <div class="chart-wrap chart-line">
            <canvas #salesLineCanvas></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
